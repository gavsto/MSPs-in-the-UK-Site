# Dockerised dev environment for the MSPs-in-the-UK Docusaurus site.
# Full instructions: see DOCKER-DEV.md
#
# Quick start (run from this folder):
#     docker compose up -d          # build if needed + start, in the background
#     docker compose logs -f        # watch the dev server
#     docker compose down           # stop
#
# The site is then live at http://localhost:3000 with hot reload. Node and all
# dependencies run inside the container; only your source is shared in.

name: msps-in-the-uk-dev

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: msps-in-the-uk-dev:latest
    container_name: msps-in-the-uk-dev
    ports:
      - "3000:3000"
    volumes:
      # Your live source (edits hot-reload into the container).
      - .:/workspace
      # Dependencies stay on an isolated named volume — never written to the host.
      - node_modules:/workspace/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

volumes:
  node_modules:
